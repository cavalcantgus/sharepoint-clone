<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/sharepoint-clone/' +
        '?p=' + encodeURIComponent(
          l.pathname.replace('/sharepoint-clone/', '') +
          l.search + l.hash
        )
      );
    </script>
  </head>
  <body></body>
</html>
