<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autenticando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f2f1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 360px;
      width: 100%;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e1dfdd;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #201f1e;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: #605e5c;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Autenticando...</h2>
    <p>Concluindo o login com a Microsoft. Esta janela fechará automaticamente.</p>
  </div>
</body>
</html>
